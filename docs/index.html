<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://hits.sh; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'">
<title>카타르항공 도하↔인천 운항 모니터링 대시보드 | Qatar Airways DOH↔ICN Flight Monitoring Dashboard</title>
<meta name="description" content="카타르항공 QR858·QR862·QR859 도하-인천 노선 영공폐쇄·지연·결항 상시 모니터링 (매시간 자동 갱신)">
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --text-muted: #898781;
    --hairline: #e1e0d9; --border: rgba(11,11,11,0.10);
    --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
    --good-text: #006300; --crit-text: #b4211f; --accent: #2a78d6;
    --banner-bg: #fdf6e3; --good-bg: #eaf6ea; --crit-bg: #fbeceb; --note-bg: #fbeceb;
    --warn-bg: #fdf1dd; --warn-text: #9a6300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19; --page: #0d0d0d;
      --text-primary: #ffffff; --text-secondary: #c3c2b7;
      --hairline: #2c2c2a; --border: rgba(255,255,255,0.10);
      --good-text: #0ca30c; --crit-text: #ff6b6a; --accent: #3987e5;
      --banner-bg: #26221a; --good-bg: #14261a; --crit-bg: #2a1615; --note-bg: #2a1615;
      --warn-bg: #2a2113; --warn-text: #f0aa2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
         background: var(--page); color: var(--text-primary); padding: 22px 20px 40px; }
  .wrap { max-width: 880px; margin: 0 auto; }

  .airstrip { display: flex; align-items: flex-start; gap: 12px; border-radius: 12px;
    padding: 14px 18px; border: 1px solid var(--border); margin-top: 16px; }
  .airstrip.open { background: var(--good-bg); }
  .airstrip.caution { background: var(--warn-bg); }
  .airstrip.closed { background: var(--crit-bg); }
  .airstrip.unknown { background: var(--banner-bg); }
  .airstrip .astatus { width: 14px; height: 14px; border-radius: 50%; flex: none; margin-top: 3px;
    box-shadow: 0 0 0 4px rgba(0,0,0,0.04); }
  .airstrip.open .astatus { background: var(--good); }
  .airstrip.caution .astatus { background: var(--warning); }
  .airstrip.closed .astatus { background: var(--critical); animation: pulse 1.4s ease-in-out infinite; }
  .airstrip.unknown .astatus { background: var(--text-muted); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .atitle { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
  .airstrip.open .atitle { color: var(--good-text); }
  .airstrip.caution .atitle { color: var(--warn-text); }
  .airstrip.closed .atitle { color: var(--crit-text); }
  .asub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
  .asrc { font-size: 11.5px; margin-top: 5px; color: var(--text-muted); }
  .asrc a { color: var(--accent); text-decoration: none; }
  .asrc a:hover { text-decoration: underline; }

  .langrow { display: flex; justify-content: flex-end; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .lang { display: flex; gap: 4px; border: 1px solid var(--hairline); border-radius: 8px; padding: 2px; }
  .lang button { font: inherit; font-size: 12.5px; font-weight: 600; padding: 5px 12px;
    border: none; border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .lang button.on { background: var(--accent); color: #fff; }
  .sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; line-height: 1.5; }
  .updated { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
  .stale { margin-top: 8px; font-size: 12px; padding: 10px 12px; border-radius: 8px;
    background: var(--banner-bg); color: var(--text-secondary); line-height: 1.55; display: none; }
  .banner { margin-top: 16px; border: 1px solid var(--border); border-radius: 12px;
            background: var(--banner-bg); padding: 14px 16px; }
  .banner h2 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .banner .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warning); flex: none; }
  .banner.crit { background: var(--crit-bg); }
  .banner.crit .dot { background: var(--critical); }
  .banner p { font-size: 12.5px; color: var(--text-secondary); margin-top: 8px; line-height: 1.65; }
  .banner b { color: var(--text-primary); }
  .banner a { color: var(--accent); }
  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 16px; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px 16px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .badgerow { margin-top: 9px; }
  .fno { font-size: 16px; font-weight: 700; }
  .temp-tag { display: inline-block; font-size: 10.5px; font-weight: 700; vertical-align: middle;
    color: #fff; background: var(--accent); border-radius: 5px; padding: 1px 6px; margin-right: 2px; }
  .route { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
           padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); white-space: nowrap; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .b-good { color: var(--good-text); } .b-good .dot { background: var(--good); }
  .b-warn { color: var(--text-primary); } .b-warn .dot { background: var(--warning); }
  .b-crit { color: var(--crit-text); } .b-crit .dot { background: var(--critical); }
  .b-check { color: var(--text-muted); } .b-check .dot { background: var(--text-muted); }
  .tablewrap { margin-top: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; table-layout: fixed; }
  th { text-align: left; font-weight: 600; font-size: 11px; color: var(--text-muted);
       text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid var(--hairline); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--hairline); color: var(--text-secondary);
       font-variant-numeric: tabular-nums; word-break: keep-all; }
  /* 헤더/상태는 줄바꿈 허용, 날짜·시각은 유지 → 좁은 화면에서도 가로 스크롤 없음 */
  td:first-child, th:first-child { white-space: nowrap; width: 21%; }
  td:nth-child(2), th:nth-child(2), td:nth-child(3), th:nth-child(3) { width: 24%; }
  td:nth-child(4), th:nth-child(4) { width: 31%; }
  td:first-child { color: var(--text-primary); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  .st-good { color: var(--good-text); font-weight: 600; }
  .st-plan { color: var(--text-secondary); }
  .st-warn { color: var(--text-primary); font-weight: 600; }
  .st-crit { color: var(--crit-text); font-weight: 600; }
  .links { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
  .links a { color: var(--accent); font-size: 12.5px; text-decoration: none; }
  .links a:hover { text-decoration: underline; }

  .statusbox { border-radius: 12px; padding: 15px 18px; margin-top: 16px; border: 1px solid var(--border); }
  .statusbox.open { background: var(--good-bg); }
  .statusbox.caution { background: var(--warn-bg); }
  .statusbox.closed { background: var(--crit-bg); border-color: rgba(208,59,59,0.35); }
  .statusbox.unknown { background: var(--banner-bg); }
  .sb-title { font-size: 14px; font-weight: 800; letter-spacing: -0.01em; }
  .statusbox.open .sb-title { color: var(--good-text); }
  .statusbox.caution .sb-title { color: var(--warn-text); }
  .statusbox.closed .sb-title { color: var(--crit-text); }
  .sb-body { font-size: 12.5px; color: var(--text-secondary); margin-top: 7px; line-height: 1.6; }
  .sb-body b { color: var(--text-primary); }
  .sb-links { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 9px 16px; }
  .sb-links a { font-size: 12.5px; font-weight: 600; color: var(--accent); text-decoration: none; }
  .sb-links a:hover { text-decoration: underline; }
  .section { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
             padding: 18px; margin-top: 16px; }
  .section h2 { font-size: 15px; font-weight: 700; }
  .section p { font-size: 12.5px; color: var(--text-secondary); margin-top: 6px; line-height: 1.55; }
  .bubbles { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 12px; }
  .bubble { border: 1px solid var(--border); border-left-width: 4px; border-radius: 10px;
    padding: 12px 14px; background: var(--page); }
  .bubble.closed { border-left-color: var(--critical); }
  .bubble.delay { border-left-color: var(--warning); }
  .bubble.cancel { border-left-color: var(--critical); }
  .bubble .bt { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .bubble.closed .bt, .bubble.cancel .bt { color: var(--crit-text); }
  .bubble.delay .bt { color: var(--text-primary); }
  .bubble .bd { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; }

  .footer { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--hairline);
            font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .footer b { color: var(--text-primary); }
  .footer a { color: var(--accent); }
  .notice-emph { margin-top: 12px; padding: 12px 14px; border-radius: 10px;
    background: var(--note-bg); border: 1px solid rgba(208,59,59,0.35);
    color: var(--crit-text); font-weight: 600; font-size: 12.5px; line-height: 1.6; }
  .notice-emph a { color: var(--crit-text); text-decoration: underline; }
  .counter { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .counter img { height: 18px; }
  #loadError { display: none; margin-top: 16px; font-size: 13px; color: var(--critical); }

  /* ── 모바일 대응 ── */
  @media (max-width: 640px) {
    body { padding: 14px 12px 32px; }
    h1 { font-size: 17px; margin-top: 12px; }
    .sub { font-size: 12px; }
    .airstrip { padding: 12px 14px; gap: 10px; }
    .atitle { font-size: 14px; }
    .banner { padding: 12px 14px; }
    .card { padding: 15px 13px 13px; }
    .section, .travelbox { padding: 14px; }
    .badge { font-size: 12px; padding: 4px 11px; }
    table { font-size: 13px; }              /* 표 글자 확대 */
    th { font-size: 10.5px; }
    th, td { padding: 7px 8px; }
    #map { height: 240px; }
    .links { gap: 9px 16px; }
    .links a { font-size: 13px; }
    .footer { font-size: 11.5px; }
    /* 언어 버튼: 손가락으로 누르기 쉽게 크게 (풀폭 3등분) */
    .langrow { justify-content: stretch; }
    .lang { width: 100%; gap: 6px; }
    .lang button { flex: 1; padding: 12px 8px; font-size: 15px; min-height: 46px; }
  }
  /* ── 아랍어 RTL ── */
  html[dir="rtl"] .langrow { justify-content: flex-start; }
  html[dir="rtl"] th, html[dir="rtl"] td { text-align: right; }
  html[dir="rtl"] .airstrip, html[dir="rtl"] .badge { direction: rtl; }
  html[dir="rtl"] .fno, html[dir="rtl"] td:nth-child(2), html[dir="rtl"] td:nth-child(3) { direction: ltr; unicode-bidi: embed; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="langrow">
      <div class="lang">
        <button id="langKo" class="on" onclick="setLang('ko')">한국어</button>
        <button id="langEn" onclick="setLang('en')">English</button>
        <button id="langAr" onclick="setLang('ar')">العربية</button>
      </div>
    </div>

    <h1 data-i18n="title"></h1>
    <div class="sub" data-i18n="subtitle"></div>
    <div class="updated" id="updated"></div>
    <div class="stale" id="staleNote"></div>
    <div id="loadError" data-i18n="load_error"></div>

    <!-- 운항·영공 통합 안내 (Travel Update + 영공 폐쇄여부) -->
    <div class="statusbox open" id="statusBox">
      <div class="sb-title" id="sbTitle"></div>
      <div class="sb-body" id="sbBody"></div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="footer">
      <span data-i18n="foot_sources"></span><br>
      <span data-i18n="foot_legend"></span>
      <div class="notice-emph" id="footNotice"></div>
      <div class="counter">
        <span data-i18n="visitors"></span>
        <img id="hitsBadge" alt="visitor count" src="" onerror="this.parentElement.style.display='none'">
      </div>
    </div>
  </div>

<script>
function ls_get(k){ try { return window.localStorage ? localStorage.getItem(k) : null; } catch(e){ return null; } }
function ls_set(k,v){ try { if (window.localStorage) localStorage.setItem(k,v); } catch(e){} }
function detectLang() {
  var s = ls_get("qrmon_lang");
  if (s) return s;
  var n = (navigator.language || "").toLowerCase();
  if (n.indexOf("ko") === 0) return "ko";
  if (n.indexOf("ar") === 0) return "ar";
  return "en";
}
var LANG = detectLang();
var SAFE_URL = "https://safeairspace.net/qatar/";
var HAMAD_URL = "https://dohahamadairport.com/airlines/flight-status";
var QR_ALERTS_URL = "https://www.qatarairways.com/en/travel-alerts.html";

var I18N = {

    updated: function(d){ return "마지막 확인: " + d.generated_at_doha + " (카타르) / " + d.generated_at_seoul + " (한국)"; },
    stale_note: "⚠ 실시간 운항 데이터 갱신이 지연되고 있습니다. 아래 상태는 정기 스케줄 기준이며, 최신 상태는 각 항공편의 Flightradar24·FlightStats·카타르항공 공식 링크에서 확인해 주세요.",

    air_open_sub: function(risk){ return "지금 카타르(도하 하마드) 영공은 정상적으로 열려 있고, 인천 노선도 평소대로 운항하고 있어요" +
      (risk ? ". 참고로 국제 권고 등급은 " + risk + "단계지만, 영공이 닫힌 것은 아닙니다" : "") + "."; },
    air_caution_title: "🟠 카타르 영공 · 폐쇄 가능성 있음 (예상)",
    air_caution_sub: function(risk){ return "카타르 영공에 대한 회피 권고가 내려져 있어, 앞으로 영공이 닫힐 가능성이 있습니다(예상). " +
      "다만 지금은 인천 노선이 정상적으로 운항 중이며, 실제로 폐쇄되면 이 박스가 빨간색으로 바뀝니다" +
      (risk ? " (국제 권고 등급 " + risk + "단계)" : "") + "."; },
    air_unknown_title: "⚪ 카타르 영공 · 상태 확인 중",
    air_unknown_sub: "영공 상태 정보를 잠시 불러오지 못했어요. 아래 출처 링크에서 직접 확인해 주세요.",
    air_closed_title: "🔴 카타르 영공 폐쇄 (확정) — 운항 차질",
    air_closed_sub: "카타르(도하 하마드) 영공이 폐쇄된 것으로 확인됩니다. 인천 노선의 결항·회항·지연 가능성이 높으니, 예약하신 편은 카타르항공 공식 채널에서 꼭 확인해 주세요.",
    air_src: function(){ return "근거: <a href='" + SAFE_URL + "' target='_blank' rel='noopener'>SafeAirspace 영공 권고(EASA·NOTAM 종합)</a> · 공식 확인: " +

      "<a href='" + HAMAD_URL + "' target='_blank' rel='noopener'>하마드국제공항</a>"; },
    banner_degraded_title: "운항 상태 실시간 확인 지연",
    banner_degraded_body: "현재 실시간 운항 데이터를 일시적으로 불러오지 못해 정기 스케줄을 표시하고 있습니다. 각 항공편의 <b>Flightradar24·카타르항공 공식</b> 링크에서 최신 상태를 확인해 주세요.",
    banner_ok_title: "현재 도하↔인천 노선 정상 운항 중",

      (risk ? " (<a href='" + SAFE_URL + "' target='_blank' rel='noopener'>SafeAirspace</a> 위험 등급: <b>" + risk + "</b>)" : "") +
      ". 영공 폐쇄·결항·지연이 감지되면 상단 표시줄과 이 배너가 자동으로 바뀝니다."; },
    banner_alert_title: "운항 차질 감지",

    th: ["출발일", "상태"],
    kinds: { sched: "✓ 운항 예정 · 정시", inflight: "✓ 비행 중", landed: "✓ 도착 완료",
             cancelled: "✕ 결항", diverted: "⚠ 회항", plan: "운항 예정",
             no_service: "스케줄상 운항 없음", checking: "확인 중" },
    delayed: function(m){ return "⚠ 지연 " + m + "분"; },
    badge: { normal: "✓ 정상 운항", inflight: "✓ 비행 중 · 정상", cancelled: "✕ 결항 발생",
             diverted: "⚠ 회항 발생", checking: "확인 중" },
    badge_delayed: function(m){ return "⚠ 지연 " + m + "분"; },

var DATA = null;

function esc(s) { return String(s == null ? "" : s).replace(/[&<>"]/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]; }); }
function t() { return I18N[LANG]; }

function applyStatic() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = (LANG === "ar") ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var v = t()[el.getAttribute("data-i18n")];
    if (typeof v === "string") el.innerHTML = v;
  });
  document.getElementById("footNotice").innerHTML = t().foot_notice;
  document.getElementById("langKo").className = LANG === "ko" ? "on" : "";
  document.getElementById("langEn").className = LANG === "en" ? "on" : "";
  document.getElementById("langAr").className = LANG === "ar" ? "on" : "";
}

function kindLabel(d) {
  if (d.kind === "delayed") return t().delayed(d.delay);
  return t().kinds[d.kind] || d.kind;
}
function badgeLabel(b) {
  b = b || {};
  if (b.kind === "delayed") return t().badge_delayed(b.delay || 0);
  return t().badge[b.kind] || t().badge.normal;
}

function affectedSummary(alerts) {
  var list = (alerts || []).filter(function(a){ return a.type !== "airspace_closed" && a.date; });
  if (!list.length) return "";
  return list.map(function(a){
    var d = esc((a.date || "").slice(5).replace("-", "/"));
    var fl = esc(a.flight || "");
    if (a.type === "cancelled") return fl + " " + d + (LANG === "ko" ? " 결항" : " cancelled");
    if (a.type === "diverted")  return fl + " " + d + (LANG === "ko" ? " 회항" : " diverted");
    if (a.type === "delay")     return fl + " " + d + (LANG === "ko" ? " " + esc(a.minutes) + "분 지연" : " +" + esc(a.minutes) + "min");
    return fl + " " + d;
  }).join(", ");
}

function closureDetailLines(d) {
  var a = d.airspace || {};
  var lines = [];
  lines.push((LANG === "ko" ? "감지 시각: " : "Detected: ") + esc(d.generated_at_doha || "-") + (LANG === "ko" ? " (도하)" : " (Doha)"));
  var adv = (a.advisories || []).map(function(x){
    return esc(x.code) + (x.valid_until ? (LANG === "ko" ? " (유효 ~" + esc(x.valid_until) + ")" : " (valid until " + esc(x.valid_until) + ")") : "");
  });
  if (adv.length) lines.push((LANG === "ko" ? "근거 권고: " : "Advisories: ") + adv.join(", "));
  var aff = affectedSummary(d.alerts);
  if (aff) lines.push((LANG === "ko" ? "영향 편·날짜: " : "Affected flights: ") + aff);
  return lines;
}

function advisoryLines(d) {
  var a = d.airspace || {};
  return (a.advisories || []).map(function(x){
    return esc(x.code) + (x.valid_until ? (LANG === "ko" ? " (유효 ~" + esc(x.valid_until) + ")" : " (valid until " + esc(x.valid_until) + ")") : "");
  });
}

function renderStatusBox() {
  var d = DATA, a = d.airspace || {}, level = a.level || "open";
  var box = document.getElementById("statusBox");
  box.className = "statusbox " + level;
  document.getElementById("sbTitle").textContent = t().sb_title;

  var lines = [];
  // 1) 카타르 영공 폐쇄 여부 (객관적)
  lines.push(t().air_status(level, a.risk_level ? esc(a.risk_level) : ""));
  // 2) 근거 권고(유효기간)
  if (level === "caution" || level === "closed") {
    var adv = advisoryLines(d);
    if (adv.length) lines.push(t().lbl_advisories + adv.join(", "));
  }
  // 3) 항공편 차질 요약
  var alerts = (d.alerts || []).filter(function(x){ return x.date; });
  if (alerts.length) lines.push(t().sb_flightalerts + affectedSummary(alerts) + t().sb_seetable);
  // 4) 실시간 조회 지연
  if (d.degraded) lines.push(t().stale_note);
  // 5) 운영자 긴급 공지(Travel Update)
  (d.travel_updates || []).forEach(function(it){
    var title = (LANG === "ko" ? it.title : (LANG === "ar" ? (it.title_ar || it.title_en || it.title) : (it.title_en || it.title))) || "";
    if (title) lines.push("📌 <a href='" + esc(it.url || "https://www.qatarairways.com/en/travel-alerts.html") +
      "' target='_blank' rel='noopener' style='color:inherit;text-decoration:underline'>" + esc(title) + "</a>");
  });
  document.getElementById("sbBody").innerHTML = lines.join("<br>");
}

function render() {
  if (!DATA) return;
  var data = DATA;
  document.getElementById("updated").textContent = t().updated(data);
  var stale = document.getElementById("staleNote");
  stale.style.display = "none";  // 상세 안내는 통합 박스에서 표시
  renderStatusBox();

  var order = data.order || Object.keys(data.flights || {});
  var html = "";
  order.forEach(function(fno) {
    var f = data.flights && data.flights[fno];
    if (!f) return;
    var route = LANG === "ko" ? f.route : f.route_en;
    var note = LANG === "ko" ? f.note : f.note_en;
    var tempTag = f.temp ? "<span class='temp-tag'>" + (LANG === "ko" ? "임시편" : "TEMP") + "</span> " : "";
    var labels = (LANG === "ko" ? f.labels : f.labels_en) || { dep: "", arr: "" };
    var rows = (f.days || []).map(function(d) {
      var cls = { good: "st-good", plan: "st-plan", warn: "st-warn", crit: "st-crit" }[d.cls] || "st-plan";
      var depTxt = LANG === "ko" ? d.dep : String(d.dep).replace("익일", "+1d");
      var arrTxt = LANG === "ko" ? d.arr : String(d.arr).replace("익일", "+1d");
      return "<tr><td>" + esc(LANG === "ko" ? d.label : d.label_en) + "</td><td>" + esc(depTxt) +
             "</td><td>" + esc(arrTxt) + "</td><td class='" + cls + "'>" + esc(kindLabel(d)) + "</td></tr>";
    }).join("");
    html += "<div class='card'>" +
      "<div class='fno'>" + tempTag + esc(fno) + "</div>" +
      "<div class='route'>" + esc(route) + " · " + esc(note) + "</div>" +
      "<div class='tablewrap'><table><thead><tr><th>" + t().th[0] + "</th><th>" + esc(labels.dep) + "</th><th>" +
      esc(labels.arr) + "</th><th>" + t().th[1] + "</th></tr></thead><tbody>" + rows + "</tbody></table></div>" +
      "</div>";
  });
  document.getElementById("cards").innerHTML = html;
}

function setLang(l) { LANG = l; ls_set("qrmon_lang", l); applyStatic(); render(); }

document.getElementById("hitsBadge").src =
  "https://hits.sh/" + location.hostname + location.pathname.replace(/index\.html$/, "") + ".svg?label=visits&color=2a78d6";

applyStatic();
fetch("data.json?t=" + Date.now())
  .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(d){ DATA = d; render(); })
  .catch(function(){
    document.getElementById("updated").textContent = "";
    document.getElementById("loadError").style.display = "block";
  });
</script>
</body>
</html>
