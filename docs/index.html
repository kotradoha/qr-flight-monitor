<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://hits.sh; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'; form-action 'none'; upgrade-insecure-requests">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>카타르항공 도하↔서울 운항 현황판 | Qatar Airways DOH↔ICN Flight Status Board</title>
<meta name="description" content="카타르항공 도하-서울 노선의 운항 상태(지연·결항)와 카타르 영공 상황을 15분마다 자동으로 보여주는 참고용 현황판">
<style>
  :root {
    color-scheme: light;
    --surface-1: #fcfcfb; --page: #f9f9f7;
    --text-primary: #0b0b0b; --text-secondary: #52514e; --text-muted: #898781;
    --hairline: #e1e0d9; --border: rgba(11,11,11,0.10);
    --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
    --good-text: #006300; --crit-text: #b4211f; --accent: #2a78d6;
    --banner-bg: #fdf6e3; --good-bg: #eaf6ea; --crit-bg: #fbeceb; --note-bg: #fbeceb;
    --warn-bg: #fdf1dd; --warn-text: #9a6300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      color-scheme: dark;
      --surface-1: #1a1a19; --page: #0d0d0d;
      --text-primary: #ffffff; --text-secondary: #c3c2b7;
      --hairline: #2c2c2a; --border: rgba(255,255,255,0.10);
      --good-text: #0ca30c; --crit-text: #ff6b6a; --accent: #3987e5;
      --banner-bg: #26221a; --good-bg: #14261a; --crit-bg: #2a1615; --note-bg: #2a1615;
      --warn-bg: #2a2113; --warn-text: #f0aa2e;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
         background: var(--page); color: var(--text-primary); padding: 22px 20px 40px; }
  .wrap { max-width: 880px; margin: 0 auto; }

  .airstrip { display: flex; align-items: flex-start; gap: 12px; border-radius: 12px;
    padding: 14px 18px; border: 1px solid var(--border); margin-top: 16px; }
  .airstrip.open { background: var(--good-bg); }
  .airstrip.caution { background: var(--warn-bg); }
  .airstrip.closed { background: var(--crit-bg); }
  .airstrip.unknown { background: var(--banner-bg); }
  .airstrip .astatus { width: 14px; height: 14px; border-radius: 50%; flex: none; margin-top: 3px;
    box-shadow: 0 0 0 4px rgba(0,0,0,0.04); }
  .airstrip.open .astatus { background: var(--good); }
  .airstrip.caution .astatus { background: var(--warning); }
  .airstrip.closed .astatus { background: var(--critical); animation: pulse 1.4s ease-in-out infinite; }
  .airstrip.unknown .astatus { background: var(--text-muted); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .atitle { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
  .airstrip.open .atitle { color: var(--good-text); }
  .airstrip.caution .atitle { color: var(--warn-text); }
  .airstrip.closed .atitle { color: var(--crit-text); }
  .asub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.5; }
  .asrc { font-size: 11.5px; margin-top: 5px; color: var(--text-muted); }
  .asrc a { color: var(--accent); text-decoration: none; }
  .asrc a:hover { text-decoration: underline; }

  .langrow { display: flex; justify-content: flex-end; }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
  .title-en { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-top: 2px; letter-spacing: -0.01em; }
  .lang { display: flex; gap: 4px; border: 1px solid var(--hairline); border-radius: 8px; padding: 2px; }
  .lang button { font: inherit; font-size: 12.5px; font-weight: 600; padding: 5px 12px;
    border: none; border-radius: 6px; background: transparent; color: var(--text-secondary); cursor: pointer; }
  .lang button.on { background: var(--accent); color: #fff; }
  .sub { color: var(--text-secondary); font-size: 13px; margin-top: 4px; line-height: 1.5; }
  .updated { color: var(--text-muted); font-size: 12px; margin-top: 8px; }
  .stale { margin-top: 8px; font-size: 12px; padding: 10px 12px; border-radius: 8px;
    background: var(--banner-bg); color: var(--text-secondary); line-height: 1.55; display: none; }
  .stale.active { background: var(--warn-bg); color: var(--warn-text); border: 1px solid #f2ce8f; font-weight: 600; }
  .tablekey { margin: 16px 0 -2px; font-size: 11.8px; line-height: 1.7; color: var(--text-secondary);
    background: var(--surface-1); border: 1px solid var(--hairline); border-radius: 8px; padding: 9px 12px; }
  .tablekey b { color: var(--text-primary); }
  .tablekey .kg { color: var(--good-text); font-weight: 700; white-space: nowrap; }
  .tablekey .kp { color: var(--text-muted); font-weight: 700; white-space: nowrap; }
  .tablekey .kw { color: var(--warn-text); font-weight: 700; white-space: nowrap; }
  .tablekey .kr { color: var(--crit-text); font-weight: 700; white-space: nowrap; }
  .sb-basis { display: inline-block; margin-top: 3px; color: var(--text-muted); font-size: 10.8px; line-height: 1.5; }
  /* 공식 페이지로 연결되는 '네모 화살표' 칩(카타르 영공 근거·Travel Updates 공지 공용) */
  .qa-go { display: inline-block; margin: 0 2px; padding: 0 6px; font-weight: 700; line-height: 1.45;
    color: var(--accent); text-decoration: none; border: 1px solid rgba(42,120,214,0.55);
    border-radius: 6px; background: rgba(42,120,214,0.10); white-space: nowrap; vertical-align: baseline; }
  .qa-go:hover { background: rgba(42,120,214,0.22); }
  .banner { margin-top: 16px; border: 1px solid var(--border); border-radius: 12px;
            background: var(--banner-bg); padding: 14px 16px; }
  .banner h2 { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .banner .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--warning); flex: none; }
  .banner.crit { background: var(--crit-bg); }
  .banner.crit .dot { background: var(--critical); }
  .banner p { font-size: 12.5px; color: var(--text-secondary); margin-top: 8px; line-height: 1.65; }
  .banner b { color: var(--text-primary); }
  .banner a { color: var(--accent); }
  .cards { display: grid; grid-template-columns: 1fr; gap: 14px; margin-top: 16px; }
  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 18px 18px 16px; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .badgerow { margin-top: 9px; }
  .fno { font-size: 16px; font-weight: 700; }
  .temp-tag { display: inline-block; font-size: 10.5px; font-weight: 700; vertical-align: middle;
    color: #fff; background: var(--accent); border-radius: 5px; padding: 1px 6px; margin-right: 2px; }
  .route { color: var(--text-secondary); font-size: 13px; margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600;
           padding: 4px 10px; border-radius: 999px; border: 1px solid var(--border); white-space: nowrap; }
  .badge .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .b-good { color: var(--good-text); } .b-good .dot { background: var(--good); }
  .b-warn { color: var(--text-primary); } .b-warn .dot { background: var(--warning); }
  .b-crit { color: var(--crit-text); } .b-crit .dot { background: var(--critical); }
  .b-check { color: var(--text-muted); } .b-check .dot { background: var(--text-muted); }
  .tablewrap { margin-top: 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; table-layout: fixed; }
  th { text-align: left; font-weight: 600; font-size: 11px; color: var(--text-muted);
       text-transform: uppercase; letter-spacing: 0.04em; padding: 6px 8px; border-bottom: 1px solid var(--hairline); }
  td { padding: 6px 8px; border-bottom: 1px solid var(--hairline); color: var(--text-secondary);
       font-variant-numeric: tabular-nums; word-break: keep-all; }
  /* 헤더/상태는 줄바꿈 허용, 날짜·시각은 유지 → 좁은 화면에서도 가로 스크롤 없음 */
  td:first-child, th:first-child { white-space: nowrap; width: 21%; }
  td:nth-child(2), th:nth-child(2), td:nth-child(3), th:nth-child(3) { width: 24%; }
  td:nth-child(4), th:nth-child(4) { width: 31%; }
  td:first-child { color: var(--text-primary); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  .st-good { color: var(--good-text); font-weight: 600; }
  .st-plan { color: var(--text-secondary); }
  .st-warn { color: var(--warn-text); font-weight: 600; }
  .st-crit { color: var(--crit-text); font-weight: 600; }
  .st-susp { color: #a2701c; font-weight: 600; }
  .dly { color: var(--warn-text); font-weight: 600; }
  .card-susp { margin: 2px 0 10px; padding: 7px 11px; border-radius: 8px; font-size: 12.5px;
               font-weight: 600; color: #8a5a12; background: #fdf3e0; border: 1px solid #f0d9a8; }
  .card-susp .cs-note { font-weight: 500; color: #9a7433; }
  .card-susp .cs-link { color: #8a5a12; font-weight: 700; text-decoration: underline; white-space: nowrap; }
  .links { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
  .links a { color: var(--accent); font-size: 12.5px; text-decoration: none; }
  .links a:hover { text-decoration: underline; }

  .statusbox { border-radius: 12px; padding: 15px 18px; margin-top: 16px; border: 1px solid var(--border); }
  .statusbox.open { background: var(--good-bg); }
  .statusbox.caution { background: var(--warn-bg); }
  .statusbox.closed { background: var(--crit-bg); border-color: rgba(208,59,59,0.35); }
  .statusbox.unknown { background: var(--banner-bg); }
  .sb-title { font-size: 14px; font-weight: 800; letter-spacing: -0.01em; }
  .statusbox.open .sb-title { color: var(--good-text); }
  .statusbox.caution .sb-title { color: var(--warn-text); }
  .statusbox.closed .sb-title { color: var(--crit-text); }
  .sb-body { font-size: 12.5px; color: var(--text-secondary); margin-top: 7px; line-height: 1.6; }
  .sb-body b { color: var(--text-primary); }
  /* '항공 운항 특기사항' — 폐쇄 여부와 분리된 결항·지연 알림. 박스 색과 무관하게 눈에 띄게. */
  .sb-notes { margin-top: 9px; padding: 9px 11px; border-radius: 8px; background: var(--warn-bg);
    border: 1px solid rgba(250,178,25,0.45); border-left: 3px solid var(--warning);
    font-size: 12.5px; line-height: 1.55; color: var(--text-primary); }
  .sb-notes .sn-label { font-weight: 800; color: var(--warn-text); }
  .sb-notes.crit { background: var(--crit-bg); border-color: rgba(208,59,59,0.45); border-left-color: var(--critical); }
  .sb-notes.crit .sn-label { color: var(--crit-text); }
  .sb-links { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 9px 16px; }
  .sb-links a { font-size: 12.5px; font-weight: 600; color: var(--accent); text-decoration: none; }
  .sb-links a:hover { text-decoration: underline; }
  .section { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
             padding: 18px; margin-top: 16px; }
  .section h2 { font-size: 15px; font-weight: 700; }
  .section p { font-size: 12.5px; color: var(--text-secondary); margin-top: 6px; line-height: 1.55; }
  .bubbles { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 12px; }
  .bubble { border: 1px solid var(--border); border-left-width: 4px; border-radius: 10px;
    padding: 12px 14px; background: var(--page); }
  .bubble.closed { border-left-color: var(--critical); }
  .bubble.delay { border-left-color: var(--warning); }
  .bubble.cancel { border-left-color: var(--critical); }
  .bubble .bt { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .bubble.closed .bt, .bubble.cancel .bt { color: var(--crit-text); }
  .bubble.delay .bt { color: var(--text-primary); }
  .bubble .bd { font-size: 12.5px; color: var(--text-secondary); line-height: 1.55; }

  .footer { margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--hairline);
            font-size: 12px; color: var(--text-secondary); line-height: 1.7; }
  .footer b { color: var(--text-primary); }
  .footer a { color: var(--accent); }
  .notice-emph { margin-top: 12px; padding: 12px 14px; border-radius: 10px;
    background: var(--note-bg); border: 1px solid rgba(208,59,59,0.35);
    color: var(--crit-text); font-weight: 600; font-size: 12.5px; line-height: 1.6; }
  .notice-emph a { display: inline-block; color: var(--accent); background: rgba(42,120,214,0.10);
    border: 1px solid rgba(42,120,214,0.55); border-radius: 6px; padding: 0 8px; margin: 1px 1px;
    font-weight: 700; text-decoration: none; white-space: nowrap; }
  .notice-emph a::after { content: " ↗"; font-weight: 700; }
  .notice-emph a:hover { background: rgba(42,120,214,0.22); }
  .notice-sign { text-align: right; margin-top: 10px; font-weight: 400; font-size: 12px;
    color: var(--crit-text); opacity: 0.85; }
  .foot-sub { display: block; margin-top: 7px; padding-left: 11px; font-size: 0.94em; opacity: 0.82; }
  .notice-sign a { display: inline; background: none; border: none; padding: 0; }
  .notice-sign a::after { content: ""; }
  .counter { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
  .counter img { height: 18px; }
  #loadError { display: none; margin-top: 16px; font-size: 13px; color: var(--critical); }

  /* ── 모바일 대응 ── */
  @media (max-width: 640px) {
    body { padding: 14px 12px 32px; }
    h1 { font-size: 17px; margin-top: 12px; }
    .sub { font-size: 12px; }
    .airstrip { padding: 12px 14px; gap: 10px; }
    .atitle { font-size: 14px; }
    .banner { padding: 12px 14px; }
    .card { padding: 15px 13px 13px; }
    .section, .travelbox { padding: 14px; }
    .badge { font-size: 12px; padding: 4px 11px; }
    table { font-size: 13px; }              /* 표 글자 확대 */
    th { font-size: 10.5px; }
    th, td { padding: 7px 8px; }
    #map { height: 240px; }
    .links { gap: 9px 16px; }
    .links a { font-size: 13px; }
    .footer { font-size: 11.5px; }
    /* 언어 버튼: 손가락으로 누르기 쉽게 크게 (풀폭 3등분) */
    .langrow { justify-content: stretch; }
    .lang { width: 100%; gap: 6px; }
    .lang button { flex: 1; padding: 12px 8px; font-size: 15px; min-height: 46px; }
  }
  /* ── 아랍어 RTL ── */
  html[dir="rtl"] .langrow { justify-content: flex-start; }
  html[dir="rtl"] th, html[dir="rtl"] td { text-align: right; }
  html[dir="rtl"] .airstrip, html[dir="rtl"] .badge { direction: rtl; }
  html[dir="rtl"] .fno, html[dir="rtl"] td:nth-child(2), html[dir="rtl"] td:nth-child(3) { direction: ltr; unicode-bidi: embed; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="langrow">
      <div class="lang">
        <button id="langKo" class="on" onclick="setLang('ko')">한국어</button>
        <button id="langEn" onclick="setLang('en')">English</button>
        <button id="langAr" onclick="setLang('ar')">العربية</button>
      </div>
    </div>

    <h1 data-i18n="title"></h1>
    <div class="title-en" id="titleEn"></div>
    <div class="sub" data-i18n="subtitle"></div>
    <div class="updated" id="updated"></div>
    <div class="stale" id="staleNote"></div>
    <div id="loadError" data-i18n="load_error"></div>

    <!-- 운항·영공 통합 안내 (Travel Update + 영공 폐쇄여부) -->
    <div class="statusbox open" id="statusBox">
      <div class="sb-title" id="sbTitle"></div>
      <div class="sb-body" id="sbBody"></div>
      <div class="sb-notes" id="sbNotes" style="display:none"></div>
    </div>

    <div class="tablekey" id="tableKey" data-i18n="table_key"></div>
    <div class="cards" id="cards"></div>

    <div class="footer">
      <span data-i18n="foot_sources"></span>
      <div class="notice-emph" id="footNotice"></div>
      <div class="counter">
        <span data-i18n="visitors"></span>
        <img id="hitsBadge" alt="visitor count" src="" onerror="this.parentElement.style.display='none'">
      </div>
    </div>
  </div>

<script>
function ls_get(k){ try { return window.localStorage ? localStorage.getItem(k) : null; } catch(e){ return null; } }
function ls_set(k,v){ try { if (window.localStorage) localStorage.setItem(k,v); } catch(e){} }
function detectLang() {
  var s = ls_get("qrmon_lang");
  if (s) return s;
  var n = (navigator.language || "").toLowerCase();
  if (n.indexOf("ko") === 0) return "ko";
  if (n.indexOf("ar") === 0) return "ar";
  return "en";
}
var LANG = detectLang();
var SAFE_URL = "https://safeairspace.net/qatar/";
var HAMAD_URL = "https://dohahamadairport.com/airlines/flight-status";
var QR_ALERTS_URL = "https://www.qatarairways.com/en/travel-alerts.html";

var I18N = {
  ko: {
    title: "카타르항공 도하 ↔ 서울 운항 현황판",
    subtitle: "한-카타르 양국 출장 기업인 등을 위하여 카타르항공 도하–서울 노선의 정상 운항·지연·결항 여부와 카타르 영공 상황을 15분마다 자동으로 불러와 보여주는 현황판입니다. 표에는 현재 비행 중이거나 향후 약 1주일간의 항공편이 표시되며, 표시 시각은 카타르항공 공식 스케줄을 기준으로 하되 운항이 임박하거나 진행 중인 편은 실제 운항(게이트) 시각이 반영됩니다.",
    updated: function(d){ return "마지막 확인: " + d.generated_at_doha + " (카타르) / " + d.generated_at_seoul + " (한국)"; },
    stale_note: "⚠ 실시간 운항 데이터 갱신이 지연되고 있습니다. 아래 상태는 정기 스케줄 기준일 수 있으니, 최신 상태는 카타르항공 공식(fs.qatarairways.com)에서 항공편명으로 확인해 주세요.",
    stale_age: function(m){ var h=Math.floor(m/60), r=m%60; var t=h?(h+"시간 "+r+"분"):(m+"분"); return "⚠ 자동 갱신이 약 " + t + " 전에서 멈춰 있어, 아래 운항 상태가 최신이 아닐 수 있습니다. 실제 상태는 카타르항공 공식(fs.qatarairways.com)·Flightradar24에서 확인해 주세요."; },
    load_error: "데이터를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.",
    th: ["출발일", "상태"],
    susp_banner: "⏸ 현재 임시 미운영 중",
    susp_notice_link: "공지 보기",
    kinds: { sched: "✓ 운항 예정", inflight: "✓ 비행 중", landed: "✓ 도착 완료",
             cancelled: "✕ 결항", diverted: "⚠ 회항", plan: "예매 가능",
             suspended: "⏸ 임시 미운영",
             no_service: "스케줄상 운항 없음", checking: "확인 중" },
    delayed: function(d){ var dd=(d&&d.delay_dep)||0, ad=(d&&d.delay_arr)||0, p=[]; if(dd>=20)p.push("출발 "+dd+"분"); if(ad>=20)p.push("도착 "+ad+"분"); if(!p.length)p.push(((d&&d.delay)||0)+"분"); return "⚠ 지연 ("+p.join(", ")+")"; },

    foot_sources: "※ 데이터 출처·산출 방식 — 상태마다 가장 신뢰도 높은 소스를 씁니다.<br>· <b>카타르 영공 폐쇄 여부</b> → <a href='https://safeairspace.net/qatar/' target='_blank' rel='noopener'>SafeAirspace</a>: 각국 항공당국의 공식 NOTAM과 EASA(유럽항공안전청) 회피권고를 모으는 항공안전 사이트로, 조종사·항공사가 참고하는 공신력 있는 안전정보입니다. 한국 노선에 실제 다수 결항이 겹치면 교차검증해 반영합니다. 다만 현지 정부·뉴스 등은 자동으로 취합하지 않아, 이 <b>폐쇄 판정은 SafeAirspace 기준</b>입니다. 카타르항공 공식 <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>Travel Updates</a>의 운항 관련 공지는 감지되면 위 안내 박스에 별도로 표기하며, 그 밖의 정보는 각 공식 채널에서 추가로 참고해 주세요.<br>· <b>‘예매 가능’ 향후편</b> → <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>Qatar Airways(카타르항공)</a>: 카타르항공이 공식 발행한 정기 스케줄을 기준으로 향후편의 시각·요일을 표시합니다(출발 ±3일 이내로 들어오면 위 FlightStats 실시간 값으로 자동 대체).<br>· <b>운항 상태·출발/도착 시각</b>(비행 중·도착 완료·지연·결항·회항) → <b>공식 전광판 우선</b>: 도하 쪽은 <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>하마드국제공항</a>, 한국 쪽은 <a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>인천국제공항</a>의 공식 운항현황(전광판)을 15분마다 받아 그대로 표시합니다. 도착이 지나 전광판 목록에서 빠진 경우엔 직전 전광판 값을 그대로 유지하며, 전광판을 아예 불러오지 못할 때만 <a href='https://www.flightstats.com/' target='_blank' rel='noopener'>Cirium/FlightStats</a>(전 세계 항공사·공항의 공식 데이터를 취합하는 글로벌 항공정보사, 공항 게이트 기준)로 대체합니다. (<a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>카타르항공 항공편 검색 페이지</a>는 자바스크립트 기반이라 직접 읽어오지 않아 표와 몇 분 차이가 날 수 있습니다.)<span class='foot-sub'>· 각 공항 전체 항공편 조회 — 하마드공항 <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>출발</a>·<a href='https://dohahamadairport.com/airlines/flight-status?type=arrivals&amp;day=today' target='_blank' rel='noopener'>도착</a> / 인천공항 <a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>출발</a>·<a href='https://www.airport.kr/ap_ko/872/subview.do' target='_blank' rel='noopener'>도착</a></span><span class='foot-sub'>참고: 자주 보시는 <a href='https://www.flightradar24.com/' target='_blank' rel='noopener'>Flightradar24</a>와 시각이 다를 수 있습니다 — Flightradar24는 기체 신호(ADS-B)로 활주로에서의 <b>실제 이착륙</b> 시각을, 위 표는 항공사·공항이 집계하는 <b>게이트</b> 시각을 보여줍니다. 둘 다 정확하며 재는 시점이 다를 뿐입니다(보통 10~20분 차이). 비행기 실시간 위치를 직접 확인하실 때는 Flightradar24가 유용합니다.</span>",
    foot_notice: "본 페이지는 한-카타르 항공 운항 흐름을 한눈에 살펴보시는 데 도움 드리고자, Claude와 GitHub을 활용해 관련 정보를 API로 15분마다 자동 연동되도록 만든 참고용 모니터링 자료입니다. 일시적인 시스템 오류·지연이 있을 수 있는 점 양해 부탁드리며, 운항 상황도 수시로 변동 가능성이 있으니 <a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>관심 있으신 항공편의 실제 현황</a>이나 <a href='https://www.qatarairways.com/en/book.html' target='_blank' rel='noopener'>항공권 예약·변경</a> 등은 반드시 카타르항공 공식 채널에서 최종 확인해 주시기 바랍니다. 비행 중 항공편의 실시간 위치는 위에 안내된 추적 사이트에서 편명으로 조회하실 수 있습니다.<div class='notice-sign'>- KOTRA 도하무역관<br>(주카타르대사관 Commercial Section)</div>",

  en: {
    title: "Qatar Airways Doha ↔ Seoul Flight Status Board",
    subtitle: "For business travelers between Korea and Qatar and others: a status board that automatically pulls and displays, every 15 minutes, the on-time / delay / cancellation status of Qatar Airways' Doha–Seoul flights and Qatar airspace conditions. The tables show flights currently in the air or within roughly the next week, with times based on Qatar Airways' official schedule; for flights that are imminent or under way, actual operating (gate) times are reflected.",
    updated: function(d){ return "Last checked: " + d.generated_at_doha + " (Qatar) / " + d.generated_at_seoul + " (Korea)"; },

             suspended: "⏸ Temporarily suspended",
             no_service: "No service this day", checking: "Checking" },
    delayed: function(d){ var dd=(d&&d.delay_dep)||0, ad=(d&&d.delay_arr)||0, p=[]; if(dd>=20)p.push("dep +"+dd+"m"); if(ad>=20)p.push("arr +"+ad+"m"); if(!p.length)p.push("+"+((d&&d.delay)||0)+"m"); return "⚠ Delayed ("+p.join(", ")+")"; },
    delay_suffix: function(d){ var ad=(d&&d.delay_arr)||0, dd=(d&&d.delay_dep)||0; if(d.kind==="landed"){ if(ad>=20)return " · ⚠ +"+ad+"m late"; if(dd>=20)return " · ⚠ dep +"+dd+"m late"; return ""; } if(ad>=20)return " · ⚠ arr +"+ad+"m late (est.)"; if(dd>=20)return " · ⚠ dep +"+dd+"m late"; return ""; },
    foot_sources: "※ Sources & how each status is derived — we use the most authoritative source per status.<br>· <b>Qatar airspace closure</b> → <a href='https://safeairspace.net/qatar/' target='_blank' rel='noopener'>SafeAirspace</a>: an aviation-safety site aggregating national authorities' official NOTAMs and EASA (EU Aviation Safety Agency) avoidance advisories — credible safety information that pilots and airlines rely on. If several actual cancellations on the Korea routes coincide, we cross-check before flagging. Note that local government and news are not collected automatically, so this <b>closure assessment is based on SafeAirspace</b>. Qatar Airways' official <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>Travel Updates</a> operational notices, when detected, are shown separately in the status box above; please also check other sources via their official channels.<br>· <b>‘Bookable’ future flights</b> → <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>Qatar Airways</a>: based on Qatar Airways' officially published timetable for the times/days of future flights (once a flight is within ±3 days, it is replaced by the live FlightStats values above).<br>· <b>Flight status & departure/arrival times</b> (in flight·landed·delayed·cancelled·diverted) → <b>official airport boards first</b>: every 15 minutes we pull each airport's official flight-status feed and show it directly — <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>Hamad International</a> (Doha side) and <a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>Incheon International</a> (Korea side). If a flight has dropped off the board (e.g. its arrival is already past), the last board value is kept; only when a board can't be reached do we fall back to <a href='https://www.flightstats.com/' target='_blank' rel='noopener'>Cirium/FlightStats</a> (a global aviation-data provider aggregating airline and airport official feeds; official gate times). (Qatar Airways' own <a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>flight-search page</a> is JavaScript-based and isn't read directly, so it may differ by a few minutes from the table.)<span class='foot-sub'>· See all flights at each airport — Hamad <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>departures</a>·<a href='https://dohahamadairport.com/airlines/flight-status?type=arrivals&amp;day=today' target='_blank' rel='noopener'>arrivals</a> / Incheon <a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>departures</a>·<a href='https://www.airport.kr/ap_ko/872/subview.do' target='_blank' rel='noopener'>arrivals</a></span><span class='foot-sub'>Note: times may differ from <a href='https://www.flightradar24.com/' target='_blank' rel='noopener'>Flightradar24</a>, which many people check — Flightradar24 reads the aircraft's ADS-B signal to show <b>actual runway</b> takeoff/landing, while the table shows the <b>gate</b> times airlines/airports record. Both are correct; they simply measure different moments (typically 10–20 min apart). To view an aircraft's live position, Flightradar24 is useful.</span>",
    foot_notice: "This page is a reference monitoring tool built with Claude and GitHub, pulling the information above via API every 15 minutes to help you see the Korea–Qatar flight situation at a glance. Please understand it may occasionally differ from reality due to temporary errors or delays, and since operations can change at any time, always obtain final confirmation through official Qatar Airways channels for the <a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>actual status of a flight you're interested in</a> or <a href='https://www.qatarairways.com/en/book.html' target='_blank' rel='noopener'>booking or changes</a>. For the live position of an in-flight aircraft, look it up by flight number on the tracking site noted above.<div class='notice-sign'>— KOTRA Doha<br>(Commercial Section, Embassy of the Republic of Korea in Qatar)</div>",

    foot_sources: "※ المصادر وكيفية تحديد كل حالة — نستخدم المصدر الأكثر موثوقية لكل حالة.<br>· <b>إغلاق المجال الجوي القطري</b> ← <a href='https://safeairspace.net/qatar/' target='_blank' rel='noopener'>SafeAirspace</a>: موقع لسلامة الطيران يجمع إشعارات NOTAM الرسمية للسلطات الوطنية وتحذيرات EASA (وكالة سلامة الطيران الأوروبية) بتجنّب المجال الجوي — معلومات موثوقة يعتمد عليها الطيارون وشركات الطيران. وإذا تزامنت إلغاءات فعلية متعددة على خطوط كوريا، نتحقق تقاطعيًا قبل الإشارة. علمًا بأن الحكومة والأخبار المحلية لا تُجمَع تلقائيًا، لذا يستند <b>تقييم الإغلاق هذا إلى SafeAirspace</b>. أما إشعارات <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>تحديثات السفر</a> التشغيلية الرسمية للخطوط القطرية فتُعرَض عند رصدها بشكل منفصل في صندوق الحالة أعلاه؛ ويرجى أيضًا مراجعة المصادر الأخرى عبر قنواتها الرسمية.<br>· <b>رحلات ‘متاح للحجز’ القادمة</b> ← <a href='https://www.qatarairways.com/en/travel-alerts.html' target='_blank' rel='noopener'>الخطوط القطرية</a>: استنادًا إلى الجدول الزمني الرسمي المنشور من الخطوط القطرية لأوقات وأيام الرحلات القادمة (وعند اقتراب الرحلة إلى ±3 أيام تُستبدَل بقيم FlightStats المباشرة أعلاه).<br>· <b>حالة الرحلة وأوقات المغادرة/الوصول</b> (في الجو·وصلت·تأخير·إلغاء·تحويل) ← <b>الشاشات الرسمية أولًا</b>: نجلب بيانات حالة الرحلات الرسمية من كل مطار كل 15 دقيقة ونعرضها مباشرة — <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>مطار حمد الدولي</a> (جهة الدوحة) و<a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>مطار إنتشون الدولي</a> (جهة كوريا). وإذا خرجت الرحلة من قائمة الشاشة (مثلاً مضى وقت وصولها) نُبقي آخر قيمة من الشاشة؛ ولا نلجأ إلى <a href='https://www.flightstats.com/' target='_blank' rel='noopener'>Cirium/FlightStats</a> (مزوّد بيانات طيران عالمي يجمع مصادر شركات الطيران والمطارات الرسمية؛ بتوقيت البوابة الرسمي) إلا عند تعذّر الوصول إلى الشاشة. (صفحة <a href='https://fs.qatarairways.com/' target='_blank' rel='noopener'>البحث عن الرحلات لدى الخطوط القطرية</a> تعتمد على JavaScript ولا تُقرأ مباشرة، لذا قد تختلف بضع دقائق عن الجدول.)<span class='foot-sub'>· عرض جميع الرحلات في كل مطار — مطار حمد <a href='https://dohahamadairport.com/airlines/flight-status?type=departures&amp;day=today' target='_blank' rel='noopener'>المغادرة</a>·<a href='https://dohahamadairport.com/airlines/flight-status?type=arrivals&amp;day=today' target='_blank' rel='noopener'>الوصول</a> / مطار إنتشون <a href='https://www.airport.kr/ap_ko/869/subview.do' target='_blank' rel='noopener'>المغادرة</a>·<a href='https://www.airport.kr/ap_ko/872/subview.do' target='_blank' rel='noopener'>الوصول</a></span><span class='foot-sub'>ملاحظة: قد تختلف الأوقات عن <a href='https://www.flightradar24.com/' target='_blank' rel='noopener'>Flightradar24</a> الذي يتابعه كثيرون — يقرأ Flightradar24 إشارة ADS-B للطائرة ليعرض <b>الإقلاع/الهبوط الفعلي على المدرج</b>، بينما يعرض الجدول أوقات <b>البوابة</b> التي تسجّلها شركات الطيران/المطارات. كلاهما صحيح؛ إنما يقيسان لحظتين مختلفتين (عادةً بفارق 10–20 دقيقة). ولعرض الموقع المباشر للطائرة، Flightradar24 مفيد.</span>",

    sb_title: "🔔 تحديث الرحلات والمجال الجوي",

    sb_basis: "※ تُدرَج إشعارات تحديثات السفر التشغيلية للخطوط القطرية للاسترشاد حتى إن لم تتعلق بخطوط كوريا. أما الحكومة والأخبار المحلية فلا تُجمَع تلقائيًا، لذا يرجى التحقق عبر القنوات الرسمية عند الحاجة.",

var DATA = null;

var STALE_MIN = 45;   // 마지막 갱신이 이 분(minute) 이상 지나면 '갱신 지연' 경고
function dataAgeMinutes(d) {
  try {
    var g = d && d.generated_at_utc;
    if (!g) return null;
    var t0 = Date.parse(String(g).replace(" ", "T"));
    if (isNaN(t0)) return null;
    var mins = Math.floor((Date.now() - t0) / 60000);
    return mins < 0 ? 0 : mins;
  } catch (e) { return null; }
}
function esc(s) { return String(s == null ? "" : s).replace(/[&<>"']/g, function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]; }); }
// http/https 링크만 허용(javascript: 등 위험 스킴 차단). 아니면 기본 링크로 대체.
function safeUrl(u) {
  u = String(u == null ? "" : u);
  return /^https?:\/\//i.test(u) ? u : "https://www.qatarairways.com/en/travel-alerts.html";
}
function t() { return I18N[LANG]; }
// 공식 페이지로 연결되는 네모 화살표 칩(http/https만 허용)
function qaChip(url) {
  return " <a class='qa-go' href='" + esc(safeUrl(url)) + "' target='_blank' rel='noopener'" +
    " title='" + esc(t().go_official) + "'>↗</a>";
}
// "YYYY-MM-DD" → "M/D" (공지 일자 표기용). 형식이 아니면 빈 문자열.
function mdOf(s) {
  var m = /^(\d{4})-(\d{1,2})-(\d{1,2})/.exec(String(s || ""));
  return m ? (parseInt(m[2], 10) + "/" + parseInt(m[3], 10)) : "";
}

function applyStatic() {
  document.documentElement.lang = LANG;
  document.documentElement.dir = (LANG === "ar") ? "rtl" : "ltr";
  document.querySelectorAll("[data-i18n]").forEach(function(el) {
    var v = t()[el.getAttribute("data-i18n")];
    if (typeof v === "string") el.innerHTML = v;
  });
  document.getElementById("footNotice").innerHTML = t().foot_notice;
  var te = document.getElementById("titleEn");
  if (te) { te.textContent = I18N.en.title; te.style.display = (LANG === "en") ? "none" : "block"; }
  document.getElementById("langKo").className = LANG === "ko" ? "on" : "";
  document.getElementById("langEn").className = LANG === "en" ? "on" : "";
  document.getElementById("langAr").className = LANG === "ar" ? "on" : "";
}

// 상태 셀 HTML(안전하게 이스케이프). 비행 중·도착 완료는 녹색 유지하고, 지연 부가문구만 황토색 span으로.
function statusHtml(d) {
  if (d.kind === "delayed") return esc(t().delayed(d));   // '지연' 상태 자체는 셀 전체가 황토색(st-warn)
  var base = esc(t().kinds[d.kind] || d.kind);
  if ((d.kind === "inflight" || d.kind === "landed") && (((d.delay_arr||0) >= 20) || ((d.delay_dep||0) >= 20))) {
    base += "<span class='dly'>" + esc(t().delay_suffix(d)) + "</span>";
  }
  return base;
}

function affectedSummary(alerts) {
  var list = (alerts || []).filter(function(a){ return a.type !== "airspace_closed" && a.date; });
  if (!list.length) return "";
  return list.map(function(a){
    var d = esc((a.date || "").slice(5).replace("-", "/"));
    var fl = esc(a.flight || "");
    if (a.type === "cancelled") return fl + " " + d + (LANG === "ko" ? " 결항" : " cancelled");
    if (a.type === "diverted")  return fl + " " + d + (LANG === "ko" ? " 회항" : " diverted");
    if (a.type === "delay") {
      var dp = +(a.dep) || 0, ar = +(a.arr) || 0;      // 출발·도착 각각 20분+면 모두 표기
      var kp = [], ep = [];
      if (dp >= 20) { kp.push(dp + "분 출발 지연"); ep.push("dep +" + dp + "min"); }
      if (ar >= 20) { kp.push(ar + "분 도착 지연"); ep.push("arr +" + ar + "min"); }
      if (!kp.length) { kp.push(esc(a.minutes) + "분 지연"); ep.push("+" + esc(a.minutes) + "min"); }
      return fl + " " + d + " " + (LANG === "ko" ? kp.join(" · ") : ep.join(" · "));
    }
    return fl + " " + d;
  }).join(", ");
}

function closureDetailLines(d) {
  var a = d.airspace || {};
  var lines = [];
  lines.push((LANG === "ko" ? "감지 시각: " : "Detected: ") + esc(d.generated_at_doha || "-") + (LANG === "ko" ? " (도하)" : " (Doha)"));
  var adv = (a.advisories || []).map(function(x){
    return esc(x.code) + (x.valid_until ? (LANG === "ko" ? " (유효 ~" + esc(x.valid_until) + ")" : " (valid until " + esc(x.valid_until) + ")") : "");
  });
  if (adv.length) lines.push((LANG === "ko" ? "근거 권고: " : "Advisories: ") + adv.join(", "));
  var aff = affectedSummary(d.alerts);
  if (aff) lines.push((LANG === "ko" ? "영향 편·날짜: " : "Affected flights: ") + aff);
  return lines;
}

function advisoryLines(d) {
  var a = d.airspace || {};
  return (a.advisories || []).map(function(x){
    return esc(x.code) + (x.valid_until ? (LANG === "ko" ? " (유효 ~" + esc(x.valid_until) + ")" : " (valid until " + esc(x.valid_until) + ")") : "");
  });
}

function renderStatusBox() {
  var d = DATA, a = d.airspace || {}, level = a.level || "open";
  var box = document.getElementById("statusBox");
  box.className = "statusbox " + level;
  document.getElementById("sbTitle").textContent = t().sb_title;

  var lines = [];
  // 1) 카타르 영공 폐쇄 여부 — 결항·지연 정황과 분리, 공식 공지/자동감지에만 근거 (☁ 아이콘)
  lines.push("☁︎ " + t().air_status(level, a.risk_level ? esc(a.risk_level) : "", !!a.override));
  // 2) 근거(유효기간) + SafeAirspace 네모 링크 칩
  if (level === "caution" || level === "closed") {
    var adv = advisoryLines(d);
    if (adv.length) lines.push(t().lbl_advisories + adv.join(", ") + qaChip(SAFE_URL));
  }
  // 2-A) 폐쇄 여부 판단 보충: 한국 노선 실제 운항 데이터도 반영됨을 '영공 줄 바로 아래'에 명시
  lines.push("<span class='sb-basis'>" + t().sb_basis_air + "</span>");
  // 3) 실시간 조회 지연
  if (d.degraded) lines.push(t().stale_note);
  // 4) 카타르항공 Travel Updates 공지(운항 관련) — ✈ 줄, (공지일) + 네모 링크 칩
  (d.qr_notices || []).forEach(function(it){
    var title = (LANG === "ko" ? it.title : (LANG === "ar" ? (it.title_ar || it.title_en || it.title) : (it.title_en || it.title))) || "";
    if (!title) return;
    var md = mdOf(it.date);
    var datePart = md ? t().lbl_qr_date(md) : "";
    lines.push("✈︎ " + t().lbl_qr_updates + datePart + esc(title) + qaChip(it.url));
  });
  // 5) 운영자 긴급 공지(일반 배너) — 있을 때만
  (d.travel_updates || []).forEach(function(it){
    var title = (LANG === "ko" ? it.title : (LANG === "ar" ? (it.title_ar || it.title_en || it.title) : (it.title_en || it.title))) || "";
    if (title) lines.push("📌 <a href=\"" + esc(safeUrl(it.url)) +
      "\" target=\"_blank\" rel=\"noopener\" style=\"color:inherit;text-decoration:underline\">" + esc(title) + "</a>");
  });
  // 6) 근거·한계 명시 (항상 표시): 어떤 소스에 근거하며 무엇은 자동 반영 안 되는지 정직하게 고지
  lines.push("<span class='sb-basis'>" + t().sb_basis + "</span>");
  document.getElementById("sbBody").innerHTML = lines.join("<br>");

  // ── 항공 운항 특기사항 (결항·지연) : 폐쇄 여부와 별도 표기 ──
  var notes = document.getElementById("sbNotes");
  var alerts = (d.alerts || []).filter(function(x){ return x.date; });
  if (alerts.length) {
    var hasCrit = alerts.some(function(x){ return x.type === "cancelled" || x.type === "diverted"; });
    notes.className = "sb-notes" + (hasCrit ? " crit" : "");
    notes.innerHTML = "<span class='sn-label'>" + t().sb_flightnotes + "</span> " +
      affectedSummary(alerts) + t().sb_seetable;
    notes.style.display = "";
  } else {
    notes.style.display = "none";
    notes.innerHTML = "";
  }
}

function render() {
  if (!DATA) return;
  var data = DATA;
  document.getElementById("updated").textContent = t().updated(data);
  var stale = document.getElementById("staleNote");
  // 데이터가 오래되면(자동 갱신 중단 등) 낡은 상태를 최신처럼 보이지 않게 경고를 띄운다.
  var ageMin = dataAgeMinutes(data);
  if (ageMin != null && ageMin >= STALE_MIN) {
    stale.innerHTML = t().stale_age(ageMin);
    stale.className = "stale active";
    stale.style.display = "block";
  } else {
    stale.style.display = "none";
  }
  renderStatusBox();

  var order = data.order || Object.keys(data.flights || {});
  var html = "";
  order.forEach(function(fno) {
    var f = data.flights && data.flights[fno];
    if (!f) return;
    var route = LANG === "ko" ? f.route : f.route_en;
    var note = LANG === "ko" ? f.note : f.note_en;
    var tempTag = f.temp ? "<span class='temp-tag'>" + (LANG === "ko" ? "임시편" : "TEMP") + "</span> " : "";
    var labels = (LANG === "ko" ? f.labels : f.labels_en) || { dep: "", arr: "" };
    var rows = (f.days || []).map(function(d) {
      var cls = { good: "st-good", plan: "st-plan", warn: "st-warn", crit: "st-crit", susp: "st-susp" }[d.cls] || "st-plan";
      var depTxt = LANG === "ko" ? d.dep : String(d.dep).replace("익일", "+1d");
      var arrTxt = LANG === "ko" ? d.arr : String(d.arr).replace("익일", "+1d");
      return "<tr><td>" + esc(LANG === "ko" ? d.label : d.label_en) + "</td><td>" + esc(depTxt) +
             "</td><td>" + esc(arrTxt) + "</td><td class='" + cls + "'>" + statusHtml(d) + "</td></tr>";
    }).join("");
    var susp = "";
    if (f.suspended) {
      var snote = LANG === "ko" ? (f.suspended_note || "") : (f.suspended_note_en || f.suspended_note || "");
      var until = f.suspended_until ? " (~" + esc(f.suspended_until) + ")" : "";
      var slink = f.suspended_url ? " <a href='" + esc(safeUrl(f.suspended_url)) +
             "' target='_blank' rel='noopener' class='cs-link'>" + esc(t().susp_notice_link) + " ↗</a>" : "";
      susp = "<div class='card-susp'>" + esc(t().susp_banner) + until +
             (snote ? " <span class='cs-note'>· " + esc(snote) + "</span>" : "") + slink + "</div>";
    }
    html += "<div class='card'>" +
      "<div class='fno'>" + tempTag + esc(fno) + "</div>" +
      "<div class='route'>" + esc(route) + " · " + esc(note) + "</div>" + susp +
      "<div class='tablewrap'><table><thead><tr><th>" + t().th[0] + "</th><th>" + esc(labels.dep) + "</th><th>" +
      esc(labels.arr) + "</th><th>" + t().th[1] + "</th></tr></thead><tbody>" + rows + "</tbody></table></div>" +
      "</div>";
  });
  document.getElementById("cards").innerHTML = html;
}

function setLang(l) { LANG = l; ls_set("qrmon_lang", l); applyStatic(); render(); }

document.getElementById("hitsBadge").src =
  "https://hits.sh/" + location.hostname + location.pathname.replace(/index\.html$/, "") + ".svg?label=visits&color=2a78d6";

applyStatic();
fetch("data.json?t=" + Date.now())
  .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(d){ DATA = d; render(); })
  .catch(function(){
    document.getElementById("updated").textContent = "";
    document.getElementById("loadError").style.display = "block";
  });
</script>
