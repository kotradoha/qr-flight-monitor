name: Update flight data

on:
  schedule:
    # 15분마다 갱신. 정시(:00)는 전 세계 작업이 몰려 지연이 크므로 피해서 :05/:20/:35/:50에 실행.
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py

      - name: Commit & push if changed
        run: |
          git config user.name "qr-monitor-bot"
          git config user.email "qr-monitor-bot@users.noreply.github.com"
          git add docs/data.json
          if ! git diff --cached --quiet; then
            git commit -m "data: update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
