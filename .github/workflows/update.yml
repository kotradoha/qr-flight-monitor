name: Update flight data

on:
  schedule:
    - cron: "7 * * * *"   # 매시간 7분 (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py

      - name: Commit & push if changed
        run: |
          git config user.name "qr-monitor-bot"
          git config user.email "qr-monitor-bot@users.noreply.github.com"
          git add docs/data.json
          if ! git diff --cached --quiet; then
            git commit -m "data: hourly update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
