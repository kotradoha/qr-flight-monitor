name: Update flight data

on:
  # 코드 변경 시 즉시 1회 실행(스케줄 크론이 지연·누락돼도 최소한 배포 때마다 갱신됨).
  # data.json만 바뀐 봇 커밋은 제외해 무한 루프를 막는다.
  push:
    branches: [main]
    paths-ignore:
      - 'docs/data.json'
  schedule:
    # 15분마다 갱신. 정시(:00)는 전 세계 작업이 몰려 지연이 크므로 피해서 :05/:20/:35/:50에 실행.
    - cron: "5,20,35,50 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run updater
        run: python scripts/update.py

      - name: Commit & push if changed
        run: |
          git config user.name "qr-monitor-bot"
          git config user.email "qr-monitor-bot@users.noreply.github.com"
          git add docs/data.json
          if git diff --cached --quiet; then
            echo "no data change; nothing to commit"; exit 0
          fi
          git commit -m "data: update $(date -u +'%Y-%m-%dT%H:%MZ')"
          # 수동 커밋과의 push 경합으로 조용히 실패하지 않도록 rebase 후 재시도.
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "pushed on attempt $i"; exit 0
            fi
            echo "push attempt $i failed; retrying..."; sleep 5
          done
          echo "ERROR: push failed after retries"; exit 1
